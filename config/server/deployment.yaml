apiVersion: v1
kind: Namespace
metadata:
  name: snappy-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snappy-server
  namespace: snappy-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snappy-server
  template:
    metadata:
      labels:
        app: snappy-server
    spec:
      containers:
        - name: snappy-server
          image: ghcr.io/nomanoma121/snappy-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_ADDR
              value: ":8080"
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: snappy-github-app
                  key: app-id
            - name: GITHUB_PRIVATE_KEY_PATH
              value: "/secrets/private-key.pem"
          volumeMounts:
            - name: github-private-key
              mountPath: /secrets
      volumes:
        - name: github-private-key
          secret:
            secretName: snappy-github-app
            items:
              - key: private-key.pem
                path: private-key.pem
