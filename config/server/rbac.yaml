apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: snappy-server
  namespace: snappy-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: snappy-server
  namespace: snappy-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: snappy-server
subjects:
  - kind: ServiceAccount
    name: default
    namespace: snappy-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: snappy-server
rules:
  - apiGroups: ["apps.nomanoma121.github.io"]
    resources: ["apps"]
    verbs: ["get", "list", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: snappy-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: snappy-server
subjects:
  - kind: ServiceAccount
    name: default
    namespace: snappy-system
